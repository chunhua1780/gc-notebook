<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC864"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="pageG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF6E8"/>
    </linearGradient>
    <filter id="pageShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(150,80,0,0.3)"/>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 记事本纸张 -->
  <rect x="118" y="86" width="276" height="340" rx="24" fill="url(#pageG)" filter="url(#pageShadow)"/>

  <!-- 顶部装订孔 -->
  <g fill="#FFD9A0">
    <circle cx="166" cy="86" r="12"/>
    <circle cx="256" cy="86" r="12"/>
    <circle cx="346" cy="86" r="12"/>
  </g>

  <!-- 文字行 -->
  <g fill="#F0B060" opacity="0.9">
    <rect x="156" y="176" width="200" height="14" rx="7"/>
    <rect x="156" y="214" width="160" height="14" rx="7"/>
  </g>

  <!-- 清单勾选项 -->
  <g>
    <circle cx="166" cy="278" r="14" fill="#FF9500"/>
    <path d="M159 278 L165 285 L176 270" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="190" y="270" width="150" height="14" rx="7" fill="#F0B060" opacity="0.9"/>

    <circle cx="166" cy="326" r="14" fill="none" stroke="#F0B060" stroke-width="5"/>
    <rect x="190" y="318" width="120" height="14" rx="7" fill="#F0B060" opacity="0.5"/>
  </g>
</svg>
